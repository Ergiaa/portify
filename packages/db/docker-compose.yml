name: portify

services:
  postgres:
    image: postgres
    container_name: portify-postgres
    environment:
      POSTGRES_DB: portify
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - portify_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  garage:
    image: dxflrs/garage:v1.0.1
    container_name: portify-garage
    ports:
      - "3900:3900"
      - "3901:3901"
      - "3902:3902"
    volumes:
      - ./garage.toml:/etc/garage.toml
      - portify_garage_data:/var/lib/garage/data
      - portify_garage_meta:/var/lib/garage/meta
    restart: unless-stopped

volumes:
  portify_postgres_data:
  portify_garage_data:
  portify_garage_meta:
